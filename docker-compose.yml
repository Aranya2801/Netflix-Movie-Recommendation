version: "3.9"

services:
  streamlit:
    build: .
    container_name: cineai-streamlit
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    command: >
      streamlit run app/streamlit_app.py
      --server.port=8501
      --server.address=0.0.0.0
      --server.headless=true
      --theme.base=dark
      --theme.primaryColor=#E50914
    restart: unless-stopped

  api:
    build: .
    container_name: cineai-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: unless-stopped

volumes:
  data:
  models:
